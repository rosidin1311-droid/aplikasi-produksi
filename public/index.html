<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Monitor Produksi - Realtime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-neutral-950 text-zinc-100 p-8">
    <h1 class="text-2xl font-bold mb-6">Monitor Stok WIP</h1>
    <table class="w-full text-left border-collapse bg-zinc-900 rounded-lg overflow-hidden">
        <thead>
            <tr class="bg-zinc-800">
                <th class="p-4">Customer</th>
                <th class="p-4">Item</th>
                <th class="p-4">Proses</th>
                <th class="p-4">Sisa WIP</th>
            </tr>
        </thead>
        <tbody id="tabelWip">
            <tr><td colspan="4" class="p-4 text-center">Memuat data dari Supabase...</td></tr>
        </tbody>
    </table>

    <script>
        // Ganti dengan URL dan ANON KEY dari project Supabase Anda (Settings > API)
        const supabase = supabase.createClient('https://banxtubpdekpdajadupz.supabase.co', 'YOUR_ANON_KEY');

        async function loadData() {
            const { data, error } = await supabase.from('stok_wip').select('*');
            const tbody = document.getElementById('tabelWip');
            
            if (error) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-4 text-red-500">Error: ${error.message}</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map(w => `
                <tr class="border-b border-zinc-800">
                    <td class="p-4">${w.customer}</td>
                    <td class="p-4">${w.nama_item}</td>
                    <td class="p-4">${w.proses_sekarang || '-'}</td>
                    <td class="p-4 font-bold text-amber-400">${w.sisa_wip}</td>
                </tr>
            `).join('');
        }
        loadData();
    </script>
</body>
</html>
