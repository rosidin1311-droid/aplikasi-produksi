<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONITOR WIP CLOUD V3.8</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
    </style>
</head>
<body class="bg-neutral-950 text-zinc-100 min-h-screen antialiased selection:bg-cyan-500 selection:text-neutral-950">

    <header class="border-b border-zinc-800/60 bg-neutral-950/80 backdrop-blur-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-xl shadow-[0_0_15px_rgba(6,182,212,0.3)]">
                    <span class="material-symbols-outlined text-neutral-950 font-bold block">cloud_synced</span>
                </div>
                <div>
                    <h1 class="text-base font-bold tracking-tight bg-gradient-to-r from-zinc-100 via-zinc-300 to-zinc-500 bg-clip-text text-transparent">CYBER-WIP MOBILE</h1>
                    <p class="text-[10px] text-zinc-500 tracking-wider font-medium uppercase">Mobile Manufacturing Center v3.8</p>
                </div>
            </div>
            <button onclick="toggleModal(true)" class="flex items-center gap-2 px-3 py-1.5 bg-zinc-900 border border-zinc-800 hover:border-amber-500/50 hover:bg-zinc-800 text-amber-400 text-xs font-semibold rounded-lg transition-all cursor-pointer">
                <span class="material-symbols-outlined text-sm">settings_accessibility</span> ⚙️ Pengaturan
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6 space-y-6">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <section class="bg-zinc-900/40 border border-zinc-800/80 rounded-2xl p-5 shadow-xl backdrop-blur-sm relative overflow-hidden flex flex-col justify-between">
                <div class="absolute top-0 left-0 w-1.5 h-full bg-gradient-to-b from-cyan-500 to-blue-500"></div>
                <form id="formProduksi" class="space-y-4">
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <div class="sm:col-span-2">
                            <label class="block text-[11px] font-semibold text-zinc-400 uppercase tracking-wider mb-1.5">1. Pilih Customer</label>
                            <select id="prodCust" required onchange="updateDropdownJenis()" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-3 py-2.5 text-xs text-zinc-200 focus:outline-none focus:border-cyan-500"></select>
                        </div>
                        <div>
                            <label class="block text-[11px] font-semibold text-zinc-400 uppercase tracking-wider mb-1.5">Shift</label>
                            <select id="prodShift" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-3 py-2.5 text-xs text-zinc-200"><option>Shift 1</option><option>Shift 2</option><option>Shift 3</option></select>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div><label class="block text-[11px] font-semibold text-zinc-400 uppercase tracking-wider mb-1.5">2. Jenis Barang</label><select id="prodJenis" disabled onchange="updateDropdownItem()" class="w-full bg-zinc-950 border border-zinc-800 disabled:opacity-40 rounded-xl px-3 py-2.5 text-xs text-zinc-200"></select></div>
                        <div><label class="block text-[11px] font-semibold text-zinc-400 uppercase tracking-wider mb-1.5">3. Kode Item</label><select id="prodItem" disabled class="w-full bg-zinc-950 border border-zinc-800 disabled:opacity-40 rounded-xl px-3 py-2.5 text-xs text-zinc-200"></select></div>
                    </div>
                    <div><label class="block text-[11px] font-semibold text-zinc-400 uppercase tracking-wider mb-1.5">4. Stasiun / Proses & Qty</label>
                        <div class="flex gap-2">
                            <select id="prodProses" required class="flex-1 bg-zinc-950 border border-zinc-800 rounded-xl px-3 py-2.5 text-xs text-zinc-200"></select>
                            <input type="number" id="prodQty" placeholder="Qty" class="w-24 bg-zinc-950 border border-zinc-800 rounded-xl px-3 py-2.5 text-xs text-zinc-200">
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-cyan-700 hover:bg-cyan-600 text-white font-bold text-xs py-3 rounded-xl transition-all">SUBMIT DATA</button>
                </form>
            </section>

            <section class="bg-zinc-900/40 border border-zinc-800/80 rounded-2xl p-5 shadow-xl">
                <div class="flex items-center gap-2 mb-4"><span class="material-symbols-outlined text-amber-400">sync_saved_locally</span><h2 class="text-sm font-bold uppercase text-zinc-300">Konsol Sinkronisasi</h2></div>
                <div id="syncIndicator" class="text-[10px] font-bold text-amber-400 bg-amber-950/30 px-3 py-1 rounded border border-amber-900 mb-3 inline-block">Checking Connection...</div>
                <div id="activityLogs" class="bg-zinc-950 h-32 overflow-y-auto p-3 text-[10px] font-mono text-zinc-500 rounded-xl border border-zinc-800"></div>
            </section>
        </div>

        <section class="bg-zinc-900/20 border border-zinc-800/80 rounded-2xl overflow-hidden">
            <table class="w-full text-left text-xs">
                <thead class="bg-zinc-900 text-zinc-400 uppercase"><tr><th class="p-3">Customer</th><th class="p-3">Item</th><th class="p-3 text-center">WIP</th><th class="p-3 text-right">Qty</th></tr></thead>
                <tbody id="tabelWip" class="divide-y divide-zinc-800"></tbody>
            </table>
        </section>
    </main>

    <!-- Modal & Script remains same as provided, ensuring the fetch logic utilizes the robust supabaseFetch method -->
    <script>
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhbnh0dWJwZGVrcGRhamFkdXB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MDg0NTQsImV4cCI6MjA5NTE4NDQ1NH0.pcW8pEWxZefCx6V6LMAL61LBt4H8P5jdTN8WM8z7a8o"; 
        const SUPABASE_URL = "https://banxtubpdekpdajadupz.supabase.co"; 

        async function supabaseFetch(table, method = 'GET', body = null, queryParams = '') {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${queryParams}`, {
                method,
                headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}`, "Content-Type": "application/json", "Prefer": method === 'POST' ? "return=representation" : "" },
                body: body ? JSON.stringify(body) : null
            });
            if (!res.ok) throw new Error("Connection failed");
            return res.json();
        }

        async function loadDashboardData() {
            try {
                // Fetch dari Cloud
                const [items, proses, wip] = await Promise.all([
                    supabaseFetch('master_items'),
                    supabaseFetch('master_proses'),
                    supabaseFetch('produksi', 'GET', null, '?select=*&order=id.desc')
                ]);
                dataMasterItem = items; dataMasterRouting = proses; currentWipState = wip;
                // Simpan ke local sebagai backup
                localStorage.setItem('backup_data', JSON.stringify({items, proses, wip}));
                document.getElementById('syncIndicator').innerText = "CLOUD SYNCED (ONLINE)";
                renderWipTable(wip);
            } catch(e) {
                // Fallback ke Local
                const backup = JSON.parse(localStorage.getItem('backup_data') || '{}');
                renderWipTable(backup.wip || []);
                document.getElementById('syncIndicator').innerText = "MODE OFFLINE (BACKUP)";
            }
        }
        
        // ... fungsi lainnya tetap sama ...
        window.onload = loadDashboardData;
    </script>
</body>
</html>
