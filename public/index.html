<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONITOR WIP MANUFAKTUR V3.2</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-neutral-950 text-zinc-100 min-h-screen">

    <!-- Navbar -->
    <header class="border-b border-zinc-800 bg-neutral-950/80 backdrop-blur-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="font-bold">CYBER-WIP MONITOR</h1>
            <button onclick="toggleModal(true)" class="text-xs bg-zinc-800 px-3 py-1.5 rounded-lg">⚙️ Pengaturan</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6 space-y-6">
        <!-- Form Section -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Form Produksi -->
            <section class="bg-zinc-900/40 border border-zinc-800 rounded-2xl p-5">
                <h2 class="text-sm font-bold mb-4">INPUT HASIL KERJA</h2>
                <form id="formProduksi" class="space-y-4">
                    <select id="prodCust" onchange="updateDropdownJenis()" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-2 text-xs"></select>
                    <select id="prodJenis" disabled onchange="updateDropdownItem()" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-2 text-xs"></select>
                    <select id="prodItem" disabled class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-2 text-xs"></select>
                    <input type="number" id="prodQty" placeholder="Jumlah OK" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-2 text-xs">
                    <button type="submit" class="w-full bg-cyan-600 p-2 rounded-xl text-xs font-bold">SUBMIT PRODUKSI</button>
                </form>
            </section>

            <!-- Form Delivery (DIPERBAIKI) -->
            <section class="bg-zinc-900/40 border border-zinc-800 rounded-2xl p-5">
                <h2 class="text-sm font-bold mb-4">FORM PENGIRIMAN</h2>
                <form id="formDelivery" class="space-y-4">
                    <select id="delCust" onchange="updateDelJenis()" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-2 text-xs">
                        <option value="">-- Pilih Customer --</option>
                    </select>
                    <select id="delJenis" disabled onchange="updateDelItem()" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-2 text-xs">
                        <option value="">-- Pilih Jenis --</option>
                    </select>
                    <select id="delItem" disabled class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-2 text-xs">
                        <option value="">-- Pilih Item --</option>
                    </select>
                    <input type="text" id="delNoSj" placeholder="No Surat Jalan" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-2 text-xs">
                    <input type="number" id="delQty" placeholder="Jumlah Kirim" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-2 text-xs">
                    <button type="submit" class="w-full bg-emerald-600 p-2 rounded-xl text-xs font-bold">DISPATCH GUDANG</button>
                </form>
            </section>
        </div>
    </main>

    <script>
        const API_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000/api' : window.location.origin + '/api';
        let dataMasterItem = [];

        async function loadDashboardData() {
            const r = await fetch(`${API_URL}/master`);
            const d = await r.json();
            dataMasterItem = d.items || [];
            
            // Panggil inisialisasi dropdown
            initProdDropdowns();
            initDelDropdowns();
        }

        // --- Logika Delivery ---
        function initDelDropdowns() {
            const delCust = document.getElementById('delCust');
            const uniqueCust = [...new Set(dataMasterItem.map(i => i.customer))];
            delCust.innerHTML = '<option value="">-- Pilih Customer --</option>' + uniqueCust.map(c => `<option value="${c}">${c}</option>`).join('');
        }

        function updateDelJenis() {
            const cust = document.getElementById('delCust').value;
            const selectJenis = document.getElementById('delJenis');
            const uniqueJenis = [...new Set(dataMasterItem.filter(i => i.customer === cust).map(i => i.jenis_barang))];
            selectJenis.innerHTML = '<option value="">-- Pilih Jenis --</option>' + uniqueJenis.map(j => `<option value="${j}">${j}</option>`).join('');
            selectJenis.disabled = false;
        }

        function updateDelItem() {
            const cust = document.getElementById('delCust').value;
            const jenis = document.getElementById('delJenis').value;
            const selectItem = document.getElementById('delItem');
            const items = dataMasterItem.filter(i => i.customer === cust && i.jenis_barang === jenis);
            selectItem.innerHTML = '<option value="">-- Pilih Item --</option>' + items.map(i => `<option value="${i.nama_item}">${i.nama_item}</option>`).join('');
            selectItem.disabled = false;
        }

        document.getElementById('formDelivery').addEventListener('submit', async (e) => {
            e.preventDefault();
            // ... (tambahkan logika fetch POST delivery kamu di sini)
            alert('Data dikirim!');
            loadDashboardData();
        });

        window.onload = loadDashboardData;
    </script>
</body>
</html>
