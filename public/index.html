<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONITOR WIP CLOUD V3.9</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-neutral-950 text-zinc-100 min-h-screen">

    <!-- Header & UI sama seperti sebelumnya -->
    <header class="border-b border-zinc-800 bg-neutral-950/80 p-4 sticky top-0 z-40">
        <h1 class="text-lg font-bold">CYBER-WIP MOBILE V3.9</h1>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6 space-y-6">
        <!-- Form dan Tabel -->
        <section class="bg-zinc-900 border border-zinc-800 rounded-2xl p-5">
            <div id="syncIndicator" class="text-[10px] font-bold text-amber-400">Connecting...</div>
        </section>
        <table class="w-full text-left text-xs border-collapse">
            <thead class="text-zinc-400 uppercase border-b border-zinc-800">
                <tr><th class="p-3">Customer</th><th class="p-3">Item</th><th class="p-3">WIP</th><th class="p-3">Qty</th></tr>
            </thead>
            <tbody id="tabelWip" class="divide-y divide-zinc-800"></tbody>
        </table>
    </main>

    <script>
        // KUNCI ANON KEY YANG BENAR DIMASUKKAN DI SINI
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhbnh0dWJwZGVrcGRhamFkdXB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MDg0NTQsImV4cCI6MjA5NTE4NDQ1NH0.pcW8pEWxZefCx6V6LMAL61LBt4H8P5jdTN8WM8z7a8o"; 
        const SUPABASE_URL = "https://banxtubpdekpdajadupz.supabase.co"; 

        async function supabaseFetch(table, method = 'GET', body = null, queryParams = '') {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${queryParams}`, {
                method,
                headers: { 
                    "apikey": SUPABASE_ANON_KEY, 
                    "Authorization": `Bearer ${SUPABASE_ANON_KEY}`, 
                    "Content-Type": "application/json", 
                    "Prefer": method === 'POST' ? "return=representation" : "" 
                },
                body: body ? JSON.stringify(body) : null
            });
            if (!res.ok) throw new Error(`Supabase Error: ${res.statusText}`);
            return res.json();
        }

        async function loadDashboardData() {
            try {
                const indicator = document.getElementById('syncIndicator');
                indicator.innerText = "Syncing with Cloud...";
                
                // Mengambil data produksi
                const wipData = await supabaseFetch('produksi', 'GET', null, '?select=*&order=id.desc');
                
                // Render ke tabel
                const tbody = document.getElementById('tabelWip');
                tbody.innerHTML = wipData.map(w => `
                    <tr class="hover:bg-zinc-800">
                        <td class="p-3">${w.customer || '-'}</td>
                        <td class="p-3">${w.nama_item || '-'}</td>
                        <td class="p-3">${w.proses_sekarang || '-'}</td>
                        <td class="p-3 font-bold text-cyan-400">${w.sisa_wip || 0}</td>
                    </tr>
                `).join('');
                
                indicator.innerText = "CLOUD SYNCED (ONLINE)";
                indicator.className = "text-[10px] font-bold text-emerald-400";
            } catch(e) {
                console.error(e);
                document.getElementById('syncIndicator').innerText = "ERROR: " + e.message;
            }
        }
        
        window.onload = loadDashboardData;
    </script>
</body>
</html>
