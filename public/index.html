                    <th class="p-3">Customer</th>
                    <th class="p-3">Item</th>
                    <th class="p-3">Shift</th>
                    <th class="p-3">Proses</th>
                    <th class="p-3 text-right">Sisa WIP</th>
                </tr>
            </thead>
            <tbody id="tabelWip">
                </tbody>
        </table>
    </div>

    <script>
        const SUPABASE_URL = 'https://banxtubpdekpdajadupz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhbnh0dWJwZGVrcGRhamFkdXB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MDg0NTQsImV4cCI6MjA5NTE4NDQ1NH0.pcW8pEWxZefCx6V6LMAL61LBt4H8P5jdTN8WM8z7a8o';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadDashboardData() {
    try {
        // Pastikan nama tabel di sini sama persis dengan yang ada di Supabase
        const { data, error } = await supabase.from('stok_wip').select('*');
        
        if (error) {
            console.error("Error dari Supabase:", error);
            return;
        }
        
 function renderWipTable(data) {
    const tbodyWip = document.getElementById('tabelWip');
    if (!tbodyWip) return;
    if (data.length === 0) {
        tbodyWip.innerHTML = '<tr><td colspan="5" class="p-4 text-center">Data Kosong</td></tr>';
        return;
    }
    tbodyWip.innerHTML = data.map(w => `
        <tr class="border-b border-zinc-800 hover:bg-zinc-900">
            <td class="p-3">${w.customer || '-'}</td>
            <td class="p-3">${w.nama_item || '-'}</td>
            <td class="p-3">${w.shift_kerja || '-'}</td>
            <td class="p-3">${w.proses_sekarang || '-'}</td>
            <td class="p-3 text-right font-bold text-amber-400">${w.sisa_wip || 0}</td>
        </tr>
    `).join('');
}
        window.onload = loadDashboardData;
    </script>
</body>
