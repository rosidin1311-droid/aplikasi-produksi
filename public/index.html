<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONITOR WIP MANUFAKTUR V3.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-neutral-950 text-zinc-100">
    <table class="w-full">
        <tbody id="tabelWip"></tbody>
    </table>

    <script>
        const SUPABASE_URL = 'https://banxtubpdekpdajadupz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhbnh0dWJwZGVrcGRhamFkdXB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MDg0NTQsImV4cCI6MjA5NTE4NDQ1NH0.pcW8pEWxZefCx6V6LMAL61LBt4H8P5jdTN8WM8z7a8o';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadDashboardData() {
            const { data: wipData } = await supabase.from('stok_wip').select('*');
            renderWipTable(wipData || []);
        }

        function renderWipTable(data) {
            const tbodyWip = document.getElementById('tabelWip');
            if (!tbodyWip) return;
            if (data.length === 0) {
                tbodyWip.innerHTML = '<tr><td colspan="6" class="p-4 text-center">Data Kosong</td></tr>';
                return;
            }
            tbodyWip.innerHTML = data.map(w => `
                <tr class="border-b border-zinc-800">
                    <td class="p-3">${w.customer}</td>
                    <td class="p-3">${w.jenis_barang}</td>
                    <td class="p-3">${w.nama_item}</td>
                    <td class="p-3">${w.shift_kerja}</td>
                    <td class="p-3">${w.proses_sekarang}</td>
                    <td class="p-3 font-bold text-amber-400">${w.sisa_wip}</td>
                </tr>
            `).join('');
        }
        window.onload = loadDashboardData;
    </script>
</body>
</html>
