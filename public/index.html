<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Monitor Produksi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-neutral-950 text-zinc-100 p-5">
    <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="border-b border-zinc-800">
                    <th class="p-3">Customer</th>
                    <th class="p-3">Item</th>
                    <th class="p-3">Jenis</th>
                </tr>
            </thead>
            <tbody id="tabelWip">
                <tr><td colspan="3" class="p-4 text-center">Memuat...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const supabase = supabase.createClient('https://banxtubpdekpdajadupz.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhbnh0dWJwZGVrcGRhamFkdXB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MDg0NTQsImV4cCI6MjA5NTE4NDQ1NH0.pcW8pEWxZefCx6V6LMAL61LBt4H8P5jdTN8WM8z7a8o');

        async function loadData() {
            const { data } = await supabase.from('stok_wip').select('*');
            const tbody = document.getElementById('tabelWip');
            
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="p-4 text-center">Data Kosong</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(w => `
                <tr class="border-b border-zinc-800">
                    <td class="p-3">${w.customer || '-'}</td>
                    <td class="p-3">${w.nama_item || '-'}</td>
                    <td class="p-3">${w.jenis_barang || '-'}</td>
                </tr>
            `).join('');
        }
        window.onload = loadData;
    </script>
</body>
</html>
